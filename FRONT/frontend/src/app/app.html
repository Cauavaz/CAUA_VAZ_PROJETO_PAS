@if (showHeader()) {
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <a class="sidebar-brand" routerLink="/dashboard" aria-label="Gestão de Títulos">
          <span class="brand-icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7h18"></path>
              <path d="M3 12h18"></path>
              <path d="M3 17h12"></path>
            </svg>
          </span>
          <span class="brand-text">Gestão de Títulos</span>
        </a>

        <nav class="sidebar-nav">
          <a
            routerLink="/dashboard"
            routerLinkActive="active"
            class="nav-item"
          >
            <span class="nav-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9" rx="2"></rect>
                <rect x="14" y="3" width="7" height="5" rx="2"></rect>
                <rect x="14" y="12" width="7" height="9" rx="2"></rect>
                <rect x="3" y="16" width="7" height="5" rx="2"></rect>
              </svg>
            </span>
            <span class="nav-label">Dashboard</span>
          </a>

          <a
            routerLink="/titulos"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-item"
          >
            <span class="nav-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="16" rx="3"></rect>
                <path d="M3 9h18"></path>
                <path d="M9 4v16"></path>
              </svg>
            </span>
            <span class="nav-label">Títulos Cadastrados</span>
          </a>

          <a routerLink="/titulos/novo" routerLinkActive="active" class="nav-item">
            <span class="nav-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
            </span>
            <span class="nav-label">Cadastrar Título</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          @if (currentUser(); as user) {
            <div class="user-menu-container">
              <button type="button" class="user-card" (click)="toggleUserMenu()" aria-label="Menu do usuário">
                <span class="user-avatar">{{ (user.name || user.email || '?').charAt(0).toUpperCase() }}</span>
                <div class="user-text">
                  <span class="user-name">{{ user.name || 'Usuário' }}</span>
                  <span class="user-email">{{ user.email }}</span>
                </div>
                <span class="user-menu-arrow" [class.open]="userMenuOpen()">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </span>
              </button>
              
              @if (userMenuOpen()) {
                <div class="user-dropdown" (click)="$event.stopPropagation()">
                  <button type="button" class="dropdown-item" (click)="toggleTheme(); closeUserMenu()">
                    <span class="dropdown-icon">
                      @if (themeService.isDark()) {
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <circle cx="12" cy="12" r="5"></circle>
                          <line x1="12" y1="1" x2="12" y2="3"></line>
                          <line x1="12" y1="21" x2="12" y2="23"></line>
                          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                          <line x1="1" y1="12" x2="3" y2="12"></line>
                          <line x1="21" y1="12" x2="23" y2="12"></line>
                          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                      } @else {
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                      }
                    </span>
                    <span class="dropdown-label">
                      {{ themeService.isDark() ? 'Modo Claro' : 'Modo Escuro' }}
                    </span>
                  </button>
                </div>
              }
            </div>
          }
          <button type="button" class="logout-btn" (click)="logout()" aria-label="Sair do sistema">
            <span class="nav-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </span>
            <span class="nav-label">Sair</span>
          </button>
        </div>
      </div>
    </aside>

    <main class="content">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
